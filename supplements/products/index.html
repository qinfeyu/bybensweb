<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products – ByBens Sports Nutrition Algeria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://uogwlzuiemxwsnpigydg.supabase.co" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/images/favicon.ico" />
    <script>if(localStorage.getItem('bybens_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <link rel="stylesheet" href="/supplements/footer.css" />
    <script>
      window.__initialDataPromise = fetch("/api/initial-data")
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; });
    </script>

    <link rel="stylesheet" href="/supplements/products/index.css" />
    <script>if(sessionStorage.getItem('bb_wl'))document.documentElement.classList.add('bb-noanim');</script>
  </head>
  <body>
    <!-- PAGE LOADER -->
    <div id="pageLoader">
      <div class="wl-bg"></div>
      <div class="wl-grid"></div>
      <div class="wl-rings"><div class="wl-ring"></div><div class="wl-ring"></div><div class="wl-ring"></div></div>
      <div class="wl-flares"><div class="wl-flare"></div><div class="wl-flare"></div><div class="wl-flare"></div><div class="wl-flare"></div></div>
      <div class="wl-particles"><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div><div class="wl-p"></div></div>
      <div class="wl-body">
        <div class="wl-logo-wrap">
          <div class="wl-logo-glow"></div>
          <img src="/images/logo.png" alt="ByBens" class="wl-logo" />
          <div class="wl-shine"></div>
          <div class="wl-shine2"></div>
        </div>
        <div class="wl-line"></div>
        <div class="wl-tagline">
          <span class="wl-word">FUEL</span><span class="wl-word">·</span><span class="wl-word">PERFORM</span><span class="wl-word">·</span><span class="wl-word">DOMINATE</span>
        </div>
      </div>
    </div>
    <!-- Data loading spinner -->
    <div id="dataSpinner"><div class="ds-ring"></div></div>
    <!-- Marquee Placeholder -->
    <div id="marqueePlaceholder"></div>

    <!-- ═══ HEADER ═══════════════════════════════════════════════ -->
    <header id="site-header">
      <div class="container">
        <nav class="top-nav" aria-label="Main navigation">
          <button
            class="hamburger"
            id="hamburgerBtn"
            aria-label="Toggle menu"
            aria-expanded="false"
            onclick="toggleMobileMenu()"
          >
            <span></span><span></span><span></span>
          </button>
          <!-- Logo — single <a> tag, no nesting -->
          <a href="/supplements" class="logo" aria-label="ByBens Home">
            <img src="/images/logo.png" alt="ByBens Logo" width="140" height="40" fetchpriority="high" decoding="async" style="height: auto; width: auto; max-width: 140px; object-fit: contain;" />
          </a>

          <!-- Supplements link (desktop only) -->
          <a href="/supplements/products" class="nav-link active" id="desktopSupplementsBtn">Supplements</a>

          <!-- Search bar (desktop only) -->
          <div class="search-wrap" id="desktopProductSearch" role="search">
            <input
              type="search"
              id="productSearch"
              placeholder="Search products…"
              aria-label="Search products"
              autocomplete="off"
              oninput="handleProductSearch(this.value)"
            />
            <button class="search-btn" aria-label="Search" onclick="handleProductSearch(document.getElementById('productSearch').value)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </button>
            <div class="search-dropdown" id="searchDropdown"></div>
          </div>

          <!-- Search icon (mobile only) -->
          <button
            id="mobileProductSearchBtn"
            onclick="openMobileProductSearch()"
            aria-label="Search"
            style="
              display: none;
              width: 40px;
              height: 40px;
              align-items: center;
              justify-content: center;
              border-radius: 8px;
              color: var(--black);
              background: none;
              border: none;
              cursor: pointer;
              transition: background var(--transition);
            "
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>

          <div class="nav-right">
            <div
              class="lang-switch"
              role="group"
              aria-label="Language switcher"
            >
              <button
                class="lang-btn active"
                data-lang="en"
                onclick="switchLang('en')"
              >
                EN
              </button>
              <button
                class="lang-btn"
                data-lang="fr"
                onclick="switchLang('fr')"
              >
                FR
              </button>
              <button
                class="lang-btn"
                data-lang="ar"
                onclick="switchLang('ar')"
              >
                AR
              </button>
            </div>

            <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">
              <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>

            <button
              class="cart-btn"
              aria-label="Shopping cart"
              onclick="toggleCart()"
            >
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
              </svg>
              <span class="cart-badge" id="cartBadge">3</span>
            </button>
          </div>
        </nav>
      </div>

      <!-- Category Nav -->
      <div class="cat-nav" aria-label="Product categories">
        <div class="container">
          <div class="cat-nav-inner" id="catNavInner">
            <!-- populated by loadData() -->
          </div>
        </div>
      </div>
    </header>

    <!-- Mobile Menu — no search bar, categories always in English -->
    <nav class="mobile-menu" id="mobileMenu" aria-label="Mobile navigation">
      <a href="/supplements/products" class="m-link active" onclick="toggleMobileMenu()"
        >Supplements</a
      >

      <div id="mobileCatItems"><!-- populated by loadData() --></div>

      <div class="mobile-lang">
        <button
          class="lang-btn active"
          data-lang="en"
          onclick="switchLang('en')"
        >
          EN
        </button>
        <button class="lang-btn" data-lang="fr" onclick="switchLang('fr')">
          FR
        </button>
        <button class="lang-btn" data-lang="ar" onclick="switchLang('ar')">
          AR
        </button>
        <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" style="margin-left:auto;">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </nav>

    <!-- Full-screen mobile search overlay -->
    <div
      id="mobileProductSearchOverlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: var(--white);
        z-index: 9998;
        flex-direction: column;
        padding: 20px 24px;
      "
    >
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
        <div style="position: relative; flex: 1">
          <input
            type="search"
            id="mobileProductSearchInput"
            placeholder="Search products…"
            style="
              width: 100%;
              height: 48px;
              padding: 0 48px 0 16px;
              border: 1.5px solid var(--gray-200);
              border-radius: 10px;
              font-size: 16px;
              background: var(--gray-50);
              outline: none;
              font-family: var(--font-body);
            "
            oninput="handleMobileProductSearch(this.value)"
          />
          <svg
            style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400);"
            width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          >
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <button
          onclick="closeMobileProductSearch()"
          style="
            flex-shrink: 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--red);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            padding: 8px 4px;
          "
        >
          Cancel
        </button>
      </div>
      <div id="mobileProductSearchResults" style="flex: 1; overflow-y: auto">
        <p style="font-size:13px;color:var(--gray-400);text-align:center;margin-top:40px;">
          Start typing to search products…
        </p>
      </div>
    </div>

    <!-- ═══ PAGE HERO ═════════════════════════════════════════════ -->
    <section class="page-hero">
      <div class="container page-hero-inner">
        <div class="breadcrumb">
          <a href="/supplements" data-i18n="nav.home">Home</a>
          <span>›</span>
          <strong data-i18n="products.title">All Products</strong>
        </div>
        <h1 data-i18n-html="page.hero.title">ALL <em>PRODUCTS</em></h1>
        <p data-i18n="page.hero.desc">
          Browse our full collection of authentic sports nutrition supplements.
        </p>
      </div>
    </section>
    <div
      class="mobile-overlay"
      id="mobileOverlay"
      onclick="toggleMobileMenu()"
    ></div>

    <!-- ═══ MAIN CONTENT ══════════════════════════════════════════ -->
    <div class="container">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <!-- Mobile filter button -->
          <button class="filter-toggle-btn" onclick="openFilterDrawer()">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="8" y1="12" x2="16" y2="12" />
              <line x1="11" y1="18" x2="13" y2="18" />
            </svg>
            <span data-i18n="toolbar.filters">Filters</span>
            <span class="filter-count" id="mobileFilterCount">0</span>
          </button>


          <span class="result-count" id="resultCount"
            ><strong>16</strong>
            <span data-i18n="toolbar.products">products</span></span
          >
        </div>

        <div class="toolbar-right">
          <select class="sort-select" id="sortSelect" onchange="handleSort()">
            <option value="default" data-i18n="sort.featured">
              Sort: Featured
            </option>
            <option value="price-asc" data-i18n="sort.priceAsc">
              Price: Low to High
            </option>
            <option value="price-desc" data-i18n="sort.priceDesc">
              Price: High to Low
            </option>
            <option value="rating" data-i18n="sort.rating">Top Rated</option>
            <option value="newest" data-i18n="sort.newest">Newest First</option>
            <option value="name" data-i18n="sort.name">Name A–Z</option>
          </select>

          <div class="view-toggle">
            <button
              class="view-btn active"
              id="gridViewBtn"
              onclick="setView('grid')"
              title="Grid view"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
              </svg>
            </button>
            <button
              class="view-btn"
              id="listViewBtn"
              onclick="setView('list')"
              title="List view"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Active filter chips -->
      <div class="active-filters" id="activeFilters"></div>

      <!-- Products Layout -->
      <div class="products-layout">
        <!-- Desktop sidebar -->
        <aside class="sidebar" id="desktopSidebar">
          <div id="sidebarContent"></div>
        </aside>

        <!-- Products area -->
        <div class="products-area">
          <div class="product-grid" id="productGrid"></div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>

    <!-- Mobile Filter Drawer -->
    <div
      class="sidebar-overlay"
      id="filterOverlay"
      onclick="handleOverlayClick(event)"
    >
      <div class="sidebar-drawer" id="filterDrawer">
        <div class="drawer-header">
          <h3 data-i18n="toolbar.filters">Filters</h3>
          <button class="drawer-close" onclick="closeFilterDrawer()">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div id="drawerContent"></div>
      </div>
    </div>

    <div id="footerPlaceholder"></div>

    <!-- Toast & Scroll top -->
    <div id="toast">
      <span class="toast-dot"></span><span id="toastMsg"></span>
    </div>
    <button
      id="scrollTop"
      aria-label="Scroll to top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path d="m18 15-6-6-6 6" />
      </svg>
    </button>

    <!-- WhatsApp floating button -->
    <a
      href="https://wa.me/213662269449"
      target="_blank"
      class="wa-btn"
      aria-label="WhatsApp"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="30"
        height="30"
        viewBox="0 0 24 24"
        fill="white"
      >
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
        />
      </svg>
    </a>

    <script src="/supplements/products/index.js?v=2" defer></script>

    <!-- ══ ADD TO CART MODAL ══ -->
    <div
      class="atc-overlay"
      id="atcOverlay"
      onclick="if (event.target === this) closeAddToCartModal();"
    >
      <div class="atc-modal">
        <button class="atc-close" onclick="closeAddToCartModal()">
          &#x2715;
        </button>
        <div class="atc-modal-img" id="atcImg"></div>
        <div class="atc-modal-name" id="atcName"></div>
        <div class="atc-modal-price" id="atcPrice"></div>
        <div class="atc-section" id="atcFlavorSection">
          <div class="atc-label">Flavor</div>
          <div class="atc-options" id="atcFlavorOptions"></div>
        </div>
        <div class="atc-section" id="atcWeightSection">
          <div class="atc-label">Size / Weight</div>
          <div class="atc-options" id="atcWeightOptions"></div>
        </div>
        <div class="atc-section">
          <div class="atc-label">Quantity</div>
          <div class="atc-qty-row">
            <button class="atc-qty-btn" onclick="atcChangeQty(-1)">
              &#8722;
            </button>
            <span class="atc-qty-val" id="atcQtyVal">1</span>
            <button class="atc-qty-btn" onclick="atcChangeQty(1)">+</button>
          </div>
        </div>
        <button class="atc-confirm-btn" onclick="confirmAddToCart()">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- ══ CART DRAWER ══ -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
      <div class="cart-drawer-hd">
        <span class="cart-drawer-title"
          >Cart &nbsp;<span
            id="cartDrawerCount"
            style="font-size: 15px; font-weight: 600; color: var(--gray-400)"
            >0 items</span
          ></span
        >
        <button class="cart-drawer-x" onclick="toggleCart()">&#x2715;</button>
      </div>
      <div class="cart-drawer-body" id="cartDrawerBody"></div>
      <div class="cart-drawer-ft">
        <div class="cart-total">
          <span class="cart-total-lbl">Total</span>
          <span class="cart-total-num"
            ><span id="cartDrawerTotal">0</span> DA</span
          >
        </div>
        <button class="cart-checkout" onclick="cartCheckout()">Checkout</button>
      </div>
    </div>
    <script src="/supplements/marquee.js"></script>
    <script src="/content.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supplements/supabase-client.js"></script>
    <script src="/supplements/footer.js"></script>
  </body>
</html>
