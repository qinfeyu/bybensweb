<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ByBens – Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/supplements/mgmt9kx/index.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-radial"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-wrap">
      <div class="card">
        <div class="logo-area">
          <div class="logo-text">
            <img src="/images/logo.png" alt="ByBens Logo" />
          </div>
        </div>

        <div class="heading">Welcome back</div>
        <div class="subheading">Sign in to access the admin panel</div>


        <div class="error-msg" id="loginErr">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="loginErrMsg">Invalid username or password</span>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <input
              type="email"
              id="loginUser"
              placeholder="admin@email.com"
              autocomplete="email"
            />
            <span class="input-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="loginPass"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <span class="input-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <button
              class="toggle-pass"
              type="button"
              onclick="togglePw()"
              title="Show/hide password"
            >
              <svg
                id="eye-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          <span class="btn-inner">
            <span class="btn-text">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                <polyline points="10 17 15 12 10 7" />
                <line x1="15" y1="12" x2="3" y2="12" />
              </svg>
              Sign In
            </span>
            <div class="btn-spinner"></div>
          </span>
        </button>

      </div>

      <a href="/supplements" class="back-btn">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back to Website
      </a>
    </div>

    <script src="/supplements/mgmt9kx/index.js?v=2" defer></script>
  </body>
</html>
